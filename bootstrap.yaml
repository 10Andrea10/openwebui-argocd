apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwebui-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/10Andrea10/openwebui-argocd.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
      include: "*/application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
