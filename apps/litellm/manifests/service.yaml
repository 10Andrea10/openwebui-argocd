apiVersion: v1
kind: Service
metadata:
  name: litellm-nodeport
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30400
      protocol: TCP
