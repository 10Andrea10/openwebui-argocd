environmentSecrets:
  - litellm-secret

masterkeySecretName: litellm-master-key-manual
masterkeySecretKey: masterkey

proxy_config:
  model_list:
    - model_name: fake-openai-endpoint
      litellm_params:
        model: openai/fake
        api_key: fake-key
        api_base: https://exampleopenaiendpoint-production.up.railway.app/
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    store_model_in_db: true
  litellm_settings:
    check_provider_endpoint: true
    callbacks:
      - prometheus

db:
  useExisting: true
  endpoint: postgres-cluster-rw.cnpg-database.svc.cluster.local
  secret:
    name: postgres-credentials

  deployStandalone: false

envVars:
  LITELLM_LOG: info
