apiVersion: v1
kind: PersistentVolume
metadata:
  name: openwebui-nfs-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-openwebui
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: nfs-server.nfs.svc.cluster.local
    path: /
