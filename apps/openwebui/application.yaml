apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.openwebui.com/
    chart: open-webui
    targetRevision: 13.3.1
    helm:
      releaseName: open-webui
      valuesObject:
        replicaCount: 1
        image:
          tag: "v0.8.12"
        persistence:
          enabled: true
          size: 10Gi
          accessModes:
            - ReadWriteOnce
          storageClass: local-path
        ingress:
          enabled: false
        ollama:
          enabled: false
        service:
          type: NodePort
          port: 80
          nodePort: 30880
        extraEnvVars:
          - name: WEBUI_SECRET_KEY
            value: "random_secret_for_token_generation"
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
